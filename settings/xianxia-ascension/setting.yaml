# Setting: 仙侠 · 澄冥飞升录
# Xianxia Ascension — authoritative metadata for this setting pack.

id: xianxia-ascension
display_name: 仙侠 · 澄冥飞升录
subtitle: 灵气将复未复，一人一镜窥天机
locale: zh-Hans

genre: 仙侠 / 修真飞升（低魔 + 世家宗门 + 因果宿命）
era: 架空纪元，灵气 recovering 时代
tone: 克制叙事，因果渐显，修行如逆水行舟

# Narrative anchors — passed to Planner/Generator as top-level context
protagonist_name: 裴长宁
protagonist_hook: 世家旁支子弟，偶得一镜能映心境，踏上一条不容回头的修真路
opening_year_month: 青龙历 1024 年 · 立春
chapter_count_target: 800
chapters_in_outline: 10

# Which extra rule/style files live in this setting
# (Agents will load these from state/ after bootstrap)
extra_files:
  timeline: timeline.yaml
  characters: characters.yaml
  era: era.md
  writing_style_extra: writing-style-extra.md
  iron_laws_extra: iron-laws-extra.md

# Author-mode hints the Generator will fold into its persona prompt
author_persona_hints:
  - 克制叙事，不煽情不抒情，文字冷而静（如青铜器表面的锈色）
  - 文言味融入有度——用"乃""遂""矣"等虚词点缀，而非通篇仿古
  - 长线因果是核心，伏笔埋深而后收——不是"三年之约"那种网文套路
  - 境界与心境并重，修为突破必写心魔关卡
  - 世界感来自细节：一炷香的烟气、丹鼎下的炭火、灵田里被霜打过的叶片

# Avoid-list reminders Generator can reference in prompts
genre_avoid:
  - 龙傲天开局（第一天就去夺筑基丹并把对方全家杀了）
  - 后宫（每个女角色都是潜在道侣）
  - 系统流（叮！恭喜宿主获得上古神兵）
  - 名场面堆砌（每章都在拍卖会上捡漏 / 比试大会上越阶打脸）
  - 现代网文口癖（卧槽、牛逼、666、这波稳了）
  - 境界火箭式提升（十章内从炼气飞到金丹）
  - 废柴打脸套路（开局被所有人看不起，然后第 N 章一人独战全宗门）
