# 仙侠世界观时间线（青龙历纪元）
# 以青龙历 1024 年为故事开始的锚点

'青龙历 1004':
  - date: 青龙历 1004 秋
    event: 天裂之劫——一场原因不明的大灾变致使天地灵气骤然稀薄，无数修士境界跌落、三成宗门道统断绝。此后二十年被称为「枯灵期」。

'青龙历 1014':
  - date: 青龙历 1014 夏
    event: 五大正宗之一的「天衍宗」宣布封山，拒绝接纳新弟子。同一年，三个中小宗门结盟为「青衡盟」，在灵脉枯竭地带互保生存。

'青龙历 1020':
  - date: 青龙历 1020 春
    event: 灵气首次出现回升迹象。南荒一处废弃灵田重新长出灵气草。此后数年间，各地零星出现灵气异象，被修士称为「春醒」。

'青龙历 1022':
  - date: 青龙历 1022 冬
    event: 裴氏世家族老裴守拙在一处废弃矿脉深处发现半块古石碑，碑文记载天裂之前曾有修士预言「灵潮有涨落」。此事未公开。

'青龙历 1024':
  - date: 青龙历 1024 · 立春
    event: 第一章：裴长宁在裴氏宗祠后山守夜时，第一次察觉山间异常——一粒松露在无根之处冒出微光。他伸手触碰，指尖有灼烫感。
  - date: 青龙历 1024 · 雨水
    event: 第二章：裴长宁在整理祖父遗物时翻出一枚巴掌大的铜镜。镜面无光，既不照影也不映物。他将铜镜带回房中，放于枕边。
  - date: 青龙历 1024 · 惊蛰
    event: 第三章：裴长宁被引荐至旁门小派「澄心宗」，正式踏入修真一途。同门中遇施浅，二人初面气场微妙——不是敌意，是看不透。

'青龙历 1025':
  - date: 青龙历 1025 夏
    event: 第四章：裴长宁在澄心宗第一次参与灵田轮值，因灵根驳杂被同门暗地议论。
  - date: 青龙历 1025 秋
    event: 第五章：宗门小比，裴长宁第一仗便被对手（外派历练生）重伤，静心镜出现了一瞬间的反应——不是预警，是照出了他当时的恐惧。
  - date: 青龙历 1025 冬
    event: 第六章：裴长宁首次将静心镜之秘告诉施浅。当夜，静心镜首次显影——映出的不是面容，而是一段模糊的记忆碎片。

'青龙历 1026':
  - date: 青龙历 1026 春
    event: 第七章：裴守拙病危，临终前将半块古石碑的拓片交给裴长宁。拓片上有一行小字："镜为心桥，非器也。"
  - date: 青龙历 1026 夏
    event: 第八章：澄心宗因灵脉争议与邻派「赤霞岭」摩擦升级。裴长宁第一次被卷入宗门利益——他被要求代表宗门参与一场"非战之斗"。
  - date: 青龙历 1026 秋
    event: 第九章：裴长宁第一次出宗门历练，行至南荒边界。途中遇一位低境界老修士，老者不问名姓只问他：你走得动吗？
  - date: 青龙历 1026 冬
    event: 第十章：历练之后回宗。裴长宁手中多了两样东西：一件是历练中偶然得到的残缺丹方，另一件是对自己灵根真相的初步猜测。

factions:
  天衍宗: 五大正宗之首，于青龙历 1014 年封山，至今未开。传说中底蕴最深。
  青衡盟: 三个中小宗门的联盟，在枯灵期中崛起，务实重利。
  裴氏世家: 中等世家，祖上出过元婴修士，近三代无金丹。
  赤霞岭: 旁门小派，占一条微灵脉，与澄心宗同处一片山域。
  皇朝: 世俗朝廷（大周皇朝），有专属修士供奉，但对宗门体系保持克制。
  魔道残党: 天裂之前曾兴盛一时的魔道宗派，枯灵期中近乎覆灭，残部隐藏在凡间。
