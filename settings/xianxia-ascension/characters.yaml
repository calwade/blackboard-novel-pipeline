protagonist:
  id: pei_changning
  name: 裴长宁
  gender: 男
  age_in_era_1024: 19
  origin: 裴氏世家旁支，青州梧桐郡
  appearance: 约 175cm，清瘦，眉目平淡不显锋芒，指节因常年帮家中劈柴而骨节粗大
  traits:
    - 寡言但观察细致
    - 能忍（非懦弱——是在衡量力量差）
    - 对"为什么是我"一类的问题从不多想，想的是"接下来怎么办"
  redlines:
    - 不杀师（无论宗门待他如何）
    - 不主动害无辜
    - 不允许被人控制的情绪主导决策
  contradictions:
    - 不喜争锋却擅守势（防御战本能优于进攻）
    - 看似无欲实则对"真相"有极强的执念
    - 凡人出身却对修真界的"等阶"天生迟钝——不怕金丹也不轻视炼气
  catchphrase: []
  system:
    name: 静心镜
    capability: 照映心境——能将持镜者当下的情绪、执念、心魔以具象画面呈现出来。不可预知未来、不可攻击、不可传讯。
    currency: 灵力
    initial_balance: 3
    earn_by: 每日打坐吐纳可恢复 1 点；重大心境突破（正视恐惧/放下执念）可获得额外恢复
    hard_limits:
      - 不可预知未来事件（哪怕一刻之后的事也不行）
      - 不可作用于他人（只能照自己，不可读心、不可控心）
      - 不可物理攻击或防御（镜子砸人也不行——它会在碰到他人之前自行回位）
      - 单日最多使用 1 次（超出则镜面发烫、投入灵力无效）
      - 照出的心境画面可能令持镜者情绪不稳——看着自己的恐惧具象化不是舒服的事
supporting:
  - id: pei_shouzhuo
    name: 裴守拙
    role: 裴氏世家族老 / 世家宿怨线索人
    age_in_era_1024: 67
    origin: 裴氏世家主支
    traits:
      - 深藏不露
      - 记恩记仇均记十年以上
    weakness: 年迈，寿元所剩无几（炼气期已到极限，若无突破将在三年内坐化）
    motivation: 在死前把裴家一件埋了二十年的旧事传下去
  - id: shi_qian
    name: 施浅
    role: 第一同门 / 镜像
    age_in_era_1024: 18
    origin: 不明——据说是被澄心宗宗主从野外捡回来的
    traits:
      - 表面波澜不惊
      - 直觉极准
    weakness: 不信任任何人——包括自己
    motivation: 寻找自己的来历
    loyalty_source: 第 3 章与主角第一次同门切磋后，觉得此人不对劲——不是强，是"扛得住"
  - id: wei_muyang
    name: 卫穆阳
    role: 澄心宗传功长老 / 师尊
    age_in_era_1024: 43
    origin: 青衡盟出身，后脱离青衡盟投澄心宗
    traits:
      - 看似散漫
      - 暗中考核每一个弟子
    weakness: 赌博——不是赌钱，是赌"人"。他看中一个弟子会押重注，若弟子让他失望他会无声弃之
    motivation: 找一个能接自己剑意的弟子
  - id: zhuo_yuan
    name: 卓渊
    role: 第一个敌人
    age_in_era_1024: 20
    origin: 赤霞岭外派历练生
    traits:
      - 表面纨绔
      - 记仇十年
    weakness: 自负——但不是愚蠢的自负，是有天赋在背后撑着的自负
    motivation: 在澄心宗历练期间压制所有同阶，不给赤霞岭丢脸
  - id: nanshan_laosou
    name: 南山老叟
    role: 第二方视角人物
    age_in_era_1024: 89
    origin: 散修，曾在五大正宗门下短暂学过，后因天裂之劫修为跌落，自此游历不归
    traits:
      - 看似疯癫
      - 句句有深意
    weakness: 修为已从筑基跌落至炼气后期，寿元将尽
    motivation: 在死前见证"春醒"的真正含义
