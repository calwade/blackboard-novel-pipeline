schema_version: 1
tips_by_chapter_type:
  战斗:
  - 让反派完整展示底牌后再揭露针对性克制，以原始暴力终结制造降维反差
  - 战斗间隙插入主角心率/秒表等量化数据，替代心理描写维持恐怖谷稳定
  - 能力释放时喊名+重复操作，形成'崩溃-修复-崩溃'的固化爽点节奏
  - 以'微笑+暴行'反差修辞消解仪式感，主角温和表情修饰暴力行为
  - 敌方台词缩减为'惊呼-误判-求饶'三件套，作为主角实力的反应器
  - 群战采用'画面回到X分钟前'显性跳转，实为伪多POV调度
  布局:
  - 设计'饱和式准备→挑选搭配→退剩余'的骗局闭环，以颜色等细节完成自洽
  - 将场景约束条件（公开性/废弃性）转化为可利用资源（流量/耗材）
  - 核心威胁保持缺席的在场，仅存在于推理链条中随信息揭露放大
  - 给次要角色易记绰号/特征，数章后转化为具体功能制造伏笔回收快感
  - 插入与主角无直接关系的观察者，通过其误判反刍主角威势
  - 延长温馨/幸福感积蓄落差势能，再以两行急转直下形成压力锅爆破
  过渡:
  - 以'日常-爆破-日常'节拍器形成情绪过山车，温情互动起 threat爆破转
  - 用精确到秒的钟表读数制造倒计时压迫，时间副词机械加速节奏
  - 科普注释/百科括号突然插入战斗或对话，制造伪纪录片质感
  - 独立成段冲击句处理核心反转信息，加多感叹号强制视觉停留
  - 元叙事插话向读者泄露主角不知的信息，制造讽刺张力
  - 新角色先以'被提及'状态悬置，再以身体登场制造冲击后长篇自述
  回收:
  - 效果先行原理后置，先展示奇观延迟数章再解释机制制造悬疑
  - 标签回收制造'早该想到'的伏笔快感，前期绰号后期兑现功能
  - 第三方打断将生死战转为政治博弈，延长张力周期冻结悬念
  - 系统公告/属性面板替代传统悬念描写，形成机制性文本硬质截断
  - 死亡预告悬置替代即时击杀，反派败退留'等我本体苏醒'等未兑现威胁
  - 双线并置时差：现场静默决策与监控室延迟揭秘并置，爽感来自事后转述
tips_by_scene_purpose:
  推进主线:
  - 以'信息差骗局'替代直接冲突，主角预判危机启动布局后收编新角色
  - 核心机制延迟释放，末日机制/金手指边界悬置至危机实演后逐步揭露
  - 借势型被动设计：主角主动让渡短期主动权换取长期超额收益
  - 规则套利转换：将'限制'重新定义为'杠杆'，完成认知重构
  - 用标题提前剧透制造dread而非surprise，读者在预知中体验恐惧期待
  - 双线并置：现场执行与监控室评估反馈并置，以认知时差替代即时反馈
  塑造人物:
  - 功能性快速定性：新角色首句/首动作锚定功能位，一章内完成从陌生到棋子
  - 双层关系结构：对外维持假关系，对内私有化，利用身份错位制造信息差
  - 创伤躯体化引入：弱势角色以身体姿态先行，全程无有效反抗动作
  - 四步切入法：先声夺人→身份反差→实力验证→情感绑定，快速完成三重叠加
  - 收编-工具化-吐槽代言：赋予配角'你是真畜生啊'的读者代言功能
  - 抑扬式弱者逆袭：先展示缺陷再延迟揭示隐藏能力，以撒谎诱敌完成反杀
  埋伏笔:
  - 标签回收管理：给工具人易记特征，数章后转化为具体功能
  - 前置布局代价：表皮战术需预先分离本体，变异过程伴随七天无呼吸
  - 死亡预告悬置：反派败退留未兑现威胁，维持长期张力不即时击杀
  - 故意withholding核心背景：关键经过/原因长期留白，制造数字黑洞
  - 双重可能不做定论：关键现象保持'公司发力还是面具功能'的模糊
  - 元叙事钩子：用作者插话承诺后续题材，制造穿越者辨识度
hook_recipes:
  opening_hooks:
  - pattern: 规则面板入侵型
    sample: 契书纸面忽然浮现未写过的灰烬纹路，系统判定栏缓缓渗出：【次生效力触发，担保链重构中】
    applies_to:
    - 战斗
    - 布局
  - pattern: 外部视角震惊型
    sample: 三号收费亭的瞭望员放下望远镜，手指僵在调焦轮上——他看见野坟深处有什么东西正在按契书格式排列化灰者的残留物
    applies_to:
    - 布局
    - 过渡
  - pattern: 身份规则颠覆型
    sample: 代写者抬头时，碎裂镜片后的右眼已经全灰——这是他本周第三次直视灰烬语法本源，视野里母亲的残句正从契书条款中浮出
    applies_to:
    - 回收
    - 过渡
  - pattern: 认知重构截断型
    sample: 婴儿哭声成为时段确认信号的瞬间，他看见灰烬流动中第七天深夜的画面：母亲的手指正伸向沉睡孩
    applies_to:
    - 布局
    - 回收
  - pattern: 威胁升级省略型
    sample: 深舱十七层担保链的最底端，那个名字他认得——是三天前亲手写进契书陷阱的拾荒者母
    applies_to:
    - 战斗
    - 布局
  closing_hooks:
  - pattern: 系统反应升级型
    sample: 监控室的红灯终于亮起，部长声音从杂音中切出：'把他的担保链全部给我准备好——包括那条十七层的'
    applies_to:
    - 布局
    - 回收
  - pattern: 规则面板变更型
    sample: 契书纸面弹出未授权的附加条款，灰烬炉吞吐声变了频率：【检测到次生效力，新担保节点已激活】
    applies_to:
    - 战斗
    - 布局
  - pattern: 身份暴露悬置型
    sample: 隔间外排队的人影动了动，灰话的三层含义同时抵达耳膜——眼线看见了他停笔的那三秒
    applies_to:
    - 过渡
    - 布局
  - pattern: 新地图预告型
    sample: 老闸口的灰烬浓度读数突破三年记录，而那张未登记的原始灰烬炉图纸，正从他半盲的右眼里慢慢显影
    applies_to:
    - 回收
    - 过渡
  - pattern: 道德代价物理化型
    sample: 钢笔套替代的小指突然灼痛，这是第七次微调次生效力的违约金——他数着视野里新增的灰斑，把碎裂镜片往眼窝按了按
    applies_to:
    - 战斗
    - 回收
universal:
  writing_style:
  - 战斗场景短句碎切占70%，平均每句≤15字，感叹号密度高；日常场景长句堆叠连续200字无分段
  - 对白占比浮动35%-65%：骗局场景升至60%以上纯对白推进，战斗场景降至20%以动作叙述替代
  - 时间标记密集：精确到秒的钟表读数或'下一刻''瞬间'每章12-15次，强制推进动作节奏
  - 数据外化一切：将抽象战力、时间、概率转化为具体数字，建立游戏化认知框架
  - 身体隐喻频繁：'被撒了盐的蛆''像老鼠被困'等通感错位替代传统情绪描写
  value_anchors:
  - 生存智慧：骗子逻辑的精致闭环，规则套利与信息差计算让读者获得'我懂这个套路'的认知优越
  - 荒诞幽默：广告词/公文格式入侵叙事，网络梗降维打击制造文体越界的喜剧缓冲
  - 恐怖谷美学：心率75杀鳄的非人稳定感，数据外化情绪制造认知错位
  - 守护日常的血性：'为了这样的和谐日常'的情感内核，暴力与温情强对比
  character_handling:
  - 功能性快速定性：新角色首句/首动作锚定功能位，一章内完成从陌生到棋子转换
  - 创伤躯体化引入：弱势角色以身体姿态先行，全程无有效反抗动作定义存在方式
  - 双层关系结构：对外维持假关系对内私有化，利用身份错位制造信息差爽点
  - 外部视角镜像：引入无直接关系观察者，通过其误判和震惊反刍主角威势
plot_unit_structure:
  unit_size: 5
  pattern:
  - phase: 起
    chapters: 1
    typical_action: 新危机/新角色入场，主角接收契书委托或遭遇担保链断裂预警，嵌入灰烬语法碎片
  - phase: 承
    chapters: 1-2
    typical_action: 试探性交手或骗局执行，敌方底牌逐层剥开，主角藏招不揭，插入身体脆弱性对冲
  - phase: 转
    chapters: 1
    typical_action: 灰烬直视能力针对性亮相或契书规则突变，战局断崖式逆转，从语言操控转向物理行动
  - phase: 合
    chapters: 1-2
    typical_action: 担保链重构/次生效力验证，收编新签约民或能力代价释放，章末嵌入新悬念钩子
  pacing:
    small_payoff_every: 1-2章
    big_payoff_every: 4-5章
payoff_recipes:
  爽感:
    formula: 反派展示契书陷阱深度→主角揭露灰烬语法本源直视→微调条款产生次生效力→违约代价转嫁反噬→淡定点评担保链重构
    dialog_template:
    - speaker: villain
      beats:
      - 展示精心设计的契书陷阱
      - 以灰话三层含义嘲讽主角排名
    - speaker: protagonist
      beats:
      - 碎裂镜片后右眼微睁
      - 短句指出条款缝隙的灰烬流向（≤10字）
    - speaker: villain
      beats:
      - 误判为虚张声势
      - 激活陷阱条款
    - speaker: narrator
      beats:
      - 描写次生效力触发
      - 违约代价沿担保链逆流
    - speaker: bystander
      beats:
      - 失语
      - 一句灰话惊呼
    - speaker: protagonist
      beats:
      - 调整钢笔套位置
      - 点评担保节点设计缺陷
    sample_50_chars: 你赢了！希波吕忒平静取下腰带：这是你应得的奖励！你将腰带给我不怕意外？不怕，因为以后你就是我的男人！
  掌控感:
    formula: 预判危机→饱和式契书准备→挑选搭配条款→退剩余担保节点→不同颜色/语法层级完成闭环→客户惊叹长学问
    dialog_template:
    - speaker: ally
      beats:
      - 质疑准备过度
      - 指出三份契书都配担保的风险
    - speaker: protagonist
      beats:
      - 头一撇又快速回正
      - 以心理学解释饱和式准备
      - 要求保留票据退剩余
    - speaker: ally
      beats:
      - 惊叹
      - 感叹跟着长学问
    - speaker: protagonist
      beats:
      - 内心计算担保链层数
      - 确认闭环无漏洞
    sample_50_chars: 三副弓都配箭，跟人打仗去啊？啧老符你年纪比我大但这方面差远了。为什么买不同颜色？饱和式准备买完我来搭配，心理学跟你讲。票据留好挑完退剩余，齐活了。啊心理学，跟着主任真是长学问啊！
  黑色幽默:
    formula: 高压场景插入异质文体→广告词/收容档案/灰话公文入侵→反派价值观错配崩溃→主角以网络梗降维打击→认知重构的荒诞爽感
    dialog_template:
    - speaker: villain
      beats:
      - 傲慢威胁
      - 要求有话直说
    - speaker: protagonist
      beats:
      - 轻蔑一笑
      - 掏出商品广告词回应
      - 连续植入三则异质文本
    - speaker: villain
      beats:
      - 崩溃怒骂
      - 你有病吧
    - speaker: protagonist
      beats:
      - 顺势接梗
      - 广告词无缝衔接
      - 突然严肃宣布一打三
    - speaker: villain
      beats:
      - 语塞
      - 你
    sample_50_chars: 干脆？麦语干脆面精选小麦黄金炸制。有病？有病就去安康男科医院学生证八折第二根半价。一喷净只需一喷精准锁定五秒见效蟑螂蚊子跳蚤一次消灭三大害虫。你！
  生存智慧:
    formula: 现场静默决策→监控室延迟揭秘并置→心率数据外化情绪→利用场景约束转化资源→事后转述的恐怖稳定
    dialog_template:
    - speaker: ally
      beats:
      - 误判威胁等级
      - 主动请缨安抚
    - speaker: protagonist
      beats:
      - 猛然转头确认
      - 假意同意转移道具
    - speaker: narrator
      beats:
      - 监控室报告切入
      - 心率数据播报
      - 描述反制动作
    - speaker: bystander
      beats:
      - 监控室惊呼
      - 报告特殊操作
    - speaker: protagonist
      beats:
      - 心率回落至稳定值
      - 继续执行预定方案
    sample_50_chars: 它好像没有太大敌意是你的刀吓到它了把刀给我我可以安抚它。你在说什么你确定么？我很确定相信我一次！报告0723出现特殊情况！0723正在用0726投喂624！0723心率回落到了75。晚了0723正在用刀攻击624腹部正在开膛0723钻进去了。
villain_defeat_patterns:
- pattern: 信息差打脸
  setup: 反派以为掌握契书条款全部解释权限，以灰话三层含义嘲讽主角排名低位
  twist: 主角早已通过灰烬直视获知条款缝隙中的次生流向，担保链设计存在反向漏洞
  payoff_line_template: 你这条担保链的第十七层，用的是我三个月前写的语法样本——它现在在我眼里是透明的
- pattern: 实力差秒杀
  setup: 反派以契书陷阱深度和担保节点数量制造压迫，展示精心设计的违约转嫁链条
  twist: 主角微调灰烬流向触发次生效力，违约代价沿担保链逆流反噬源头
  payoff_line_template: 节点越多，回流越慢，你数到第几层的时候发现自己动不了的
- pattern: 心理战崩溃
  setup: 反派以语言游戏和灰话层级压制，制造契约伦理上的优越感
  twist: 主角以广告词/网络梗/异质文体降维打击，瓦解其价值观锚点
  payoff_line_template: 你跟我玩灰话，我跟你玩心理学——现在你觉得哪边比较便宜
- pattern: 规则机制反制
  setup: 反派利用契书审核趋严的旺季规则，以标准化条款批量收割签约民
  twist: 主角将场景约束（审核趋严=条款密度上升）转化为杠杆，密度越高次生效力传导越快
  payoff_line_template: 你教他们写的标准句式，刚好是我三年前埋的语法样本——这叫饱和式准备
- pattern: 伏笔回收反杀
  setup: 反派使用某掮客流传出的'安全条款'，自认掌握行业机密
  twist: 该条款源自主角故意放出的陷阱样本，预留的灰烬语法后门在特定条件下激活
  payoff_line_template: 那张纸我写过七遍，每一遍的灰斑位置都不一样——你拿的是第三版，过期了
volume_transition_techniques:
  scaling_method: 每卷升级主角灰烬直视的深度（从看见流向→微调流向→创造次生节点），同时扩大担保链层级（三层→七层→十七层），反派从单个掮客升级为深舱贵族代理
  arc_closer_template: 本卷大反派（某层担保链主导者）在契书反噬中化灰，其最后残句被主角捕获研究；深舱方向传来灰烬炉格式变更通知，暗示更高层贵族已注意到次生效力存在
  next_arc_opener_template: 主角带着新视力损伤（右眼灰斑扩大）和新身份（排名晋升获得的深舱外围代理权），通过三号收费亭进入新地图——老闸口方向的原始灰烬炉遗址，那里流传着未登记语法样本的黑市
