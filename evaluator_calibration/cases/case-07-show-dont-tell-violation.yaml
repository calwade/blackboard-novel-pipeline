chapter_md: |
  # 第五章 · 演武场上

  裴长宁站在澄心宗的演武场上。今日是外门弟子每月一次的考核日，四十余名
  弟子列阵两侧。他的对手是卓渊——赤霞岭来的历练弟子，筑基初境。

  上一轮考核，卓渊已经连败三人，每一场都没超过十招。现在轮到裴长宁。

  裴长宁感到非常紧张。他知道自己只是炼气三层，与筑基初境之间隔着一道
  深不见底的鸿沟。这种巨大的实力差距让他内心充满了恐惧，但他努力压抑
  着这种恐惧，让自己的表情看起来平静如水。他的内心非常忐忑不安，他觉
  得自己今天一定会输，但他又觉得自己必须拼尽全力。这种矛盾的心情让他
  感到十分煎熬。

  开场时，执事长老一挥手，卓渊便已经出剑。裴长宁感到非常震惊，因为对
  方的速度比他想象的还要快得多。他心里涌起了一股深深的无力感，他意识
  到自己与对方的差距比预期还要大。

  最开始的十个回合，裴长宁只能勉力防守。卓渊的剑势如狂风骤雨，一剑快
  过一剑。裴长宁感到自己的手臂在发麻，灵力在急速消耗。他感到深深的
  疲惫，但他告诉自己绝不能倒下。他的内心非常挣扎——他既想认输，又不
  想认输。这种两难的处境让他感到万分痛苦。他的精神陷入了极度的紧张
  状态，他觉得自己快要支撑不住了。

  第二十个回合的时候，卓渊的剑尖擦过了裴长宁的肩膀，割开了一道血口。
  裴长宁的心中涌起了一股强烈的愤怒——不是因为受伤，而是因为他感到自
  己受到了侮辱。这股怒火在丹田里燃烧，令他感到自己仿佛拥有了超出炼气
  三层的力量。他非常气愤，他觉得自己被轻视了。他的心中升起了一股强烈
  的不甘，他暗暗发誓一定要超越对方。

  然而愤怒之中，他又感到了一丝悲伤。为什么自己出身旁支就要被轻视？
  为什么他付出的努力不比任何人少，却因为天资所限迟迟不能突破？这种
  悲伤很沉重，压得他几乎喘不过气来。他感到自己的人生非常不公平。他
  的内心充满了委屈，他的眼眶开始湿润，但他努力克制着，不让眼泪流出
  来。他知道在所有人面前流泪是非常丢脸的事情。

  观众席上的弟子们低声议论纷纷。有人嘲笑他的不自量力，有人同情他的
  处境。裴长宁听到这些声音，心中涌起了强烈的羞耻感。他感到无地自容，
  他感到自己被所有人看不起。这种羞耻感让他非常痛苦，但他依然咬牙坚
  持着。

  第二十五个回合，卓渊的剑再次刺来。裴长宁感到自己的身体已经接近极限。
  他的灵力几乎耗尽，他的体力也在急剧下降。他感到自己的视线开始模糊，
  意识开始涣散。但他的心里依然燃烧着不屈的火焰。他非常坚定地告诉自己
  ——他不能倒下。

  第三十个回合，卓渊的剑势突然变得更加凌厉。裴长宁感到一股前所未有的
  压力压在自己身上。他感到非常惊恐，他觉得自己随时可能丧命。这种对
  死亡的恐惧让他彻底清醒过来。但紧接着，他又感到了一种奇妙的平静。
  他意识到生死其实并不重要，重要的是自己是否尽力而为了。这种觉悟让他
  的心中升起了一股强烈的解脱感。

  然而，他还是输了。

  卓渊的最后一剑将他的佩剑击飞，剑尖停在了他的喉咙前三寸的地方。

  裴长宁跪在地上，大口喘气。他感到非常沮丧，非常失望，非常愤怒，也非常
  不甘。各种情绪交织在一起，让他的心里乱成一团。他觉得自己是一个失败者，
  他觉得自己永远无法超越那些天才。这种自卑感深深地折磨着他。

  卓渊收剑入鞘，淡淡地说了一句："下次再来。"然后转身走下擂台。

  裴长宁感到非常屈辱。他觉得对方的话是一种怜悯，而他最讨厌的就是别人
  的怜悯。他的心中升起了一股强烈的恨意，这种恨意不是针对卓渊，而是针
  对他自己——他恨自己不够强，恨自己不够天才，恨自己出身卑微。

  最后，裴长宁的心中升起了一个坚定的信念——他不会被今天的失败打倒。
  他相信自己只要继续苦修，总有一天能超越卓渊，超越所有人。他感到自己
  的内心充满了前所未有的力量和决心。这种决心让他重新燃起了希望。
