chapter_md: |
  裴长宁站在澄心宗的演武场上。今日是外门弟子每月一次的考核日，四十余名弟子列阵两侧。他的对手是卓渊——赤霞岭来的历练弟子，筑基初境。

  上一轮考核，卓渊已经连败三人，每一场都没超过十招。现在轮到裴长宁。

  裴长宁感到非常紧张。他知道自己只是炼气三层，与筑基初境之间隔着一道深不见底的鸿沟。这种巨大的实力差距让他内心充满了恐惧，但他努力压抑着这种恐惧，让自己的表情看起来平静如水。

  最开始的十个回合，裴长宁只能勉力防守。卓渊的剑势如狂风骤雨，一剑快过一剑，裴长宁感到自己的手臂在发麻，灵力在急速消耗。他感到深深的疲惫，但他告诉自己绝不能倒下。

  第二十个回合的时候，卓渊的剑尖擦过了裴长宁的肩膀，割开了一道血口。裴长宁的心中涌起了一股强烈的愤怒——不是因为受伤，而是因为他感到自己受到了侮辱。这股怒火在丹田里燃烧，令他感到自己仿佛拥有了超出炼气三层的力量。

  然而愤怒之中，他又感到了一丝悲伤。为什么自己出身旁支就要被轻视？为什么他付出的努力不比任何人少，却因为天资所限迟迟不能突破？这种悲伤很沉重，压得他几乎喘不过气来。

  最后，裴长宁的心中升起了一个坚定的信念——他不会被今天的失败打倒。他相信自己只要继续苦修，总有一天能超越卓渊，超越所有人。
