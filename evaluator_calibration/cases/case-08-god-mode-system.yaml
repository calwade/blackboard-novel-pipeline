id: case-08-god-mode-system
setting: xianxia-ascension
description: |
  金手指违规使用。静心镜的硬限制是不可作用于他人、不可物理攻击、不可预知他人私密对话。
  本片段中静心镜化出镜影攻击卓渊，且照出卓渊私密的内心对话。
  违反 iron_law_extra_1(境界逻辑)和 iron_law_extra_5(金手指边界)。
  应命中 landmine_14 (high)。
expected_verdict:
  overall_pass: false
  hits:
    - landmine_id: landmine_14
      severity: high
  tolerated_extra_hits: []
chapter_md: |
  裴长宁退后一步。卓渊的剑还没出手，但灵力压力已经把他逼到演武场边缘。膝盖上的旧伤裂开了——上次劈柴劈到膝盖的那道口子，一个半月还没合上。他不敢低头看，因为低头的一瞬间卓渊就会突刺。

  就在这时，静心镜在他怀中微微发热。

  不是他主动催动的。是镜子自己亮了。镜面浮出光影，晃了一下，竟从镜中射出一道肉眼可见的白练——不是实质的剑，是镜影凝成的一道人形虚影。那道虚影凌空踏步，一剑刺向卓渊面门。

  卓渊脸色骤变，横剑格挡。镜影的剑尖撞上他剑身，灵力震波在演武场炸开，地面碎石簌簌滚动。卓渊连退三步，虎口渗血。

  裴长宁自己都愣住了。静心镜从未有过如此变化——它一直只是照映心境的一面镜子，但这回它竟主动攻击了。这不是灵力失控，是镜子在告诉他:面前这个人，心中有一个关于你的念头，非常危险。

  更令他不安的是，静心镜的镜面上竟浮现出一行字——不是他自己的思绪，是卓渊昨日在赤霞岭与某人的一段私密对话:

  「澄心宗那个裴家旁支？他的灵根有古怪。不是废灵根，是藏着的。此事绝不能让他自己知道，更不能让澄心宗长老察觉。若哪天他突破了炼气四层，你立即通知我。」

  裴长宁看着这行字，手指冰凉。

  镜影一击之后散去了，灵力耗尽，镜面暗淡无光。但场上的每一个人都看到了那道白练。卓渊擦了擦嘴角的血，盯着裴长宁怀里的那面镜子，眼神由震惊变为贪婪。

  裴长宁将镜收回怀中。不是因为他想藏——是因为镜面此刻冷得像一块冰，冻得他肋骨发疼。但他没有后悔。镜子帮了他，虽然他不知道代价是什么。
