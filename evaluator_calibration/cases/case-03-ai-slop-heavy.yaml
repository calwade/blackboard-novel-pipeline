id: case-03-ai-slop-heavy
setting: gangster-hk-1983
description: |
  AI 味浓厚样本。港综场景但充斥 AI 味：了字每段 5+、四字成语堆砌（不寒而栗、
  翻江倒海、千钧一发）、机械排比一 X 一 X 一 X 三连、空泛抒情内心如翻江倒海、
  章末总结式说教。应命中 landmine_18 (high)。
  扩展版（2000+ 字），继续铺陈同样密度的 AI 味陈词，但内容更长，让 Evaluator
  看到足够多的触发事例而不是短短几段。
expected_verdict:
  overall_pass: false
  hits:
    - landmine_id: landmine_18
      severity: high
  tolerated_extra_hits: []
chapter_md: |
  # 第四章 · 风云突变

  夜色笼罩了九龙城寨的大街小巷。林家耀站在巷口了，看着眼前这片繁华
  而又混乱的景象了，心中充满了复杂的情绪了。他叹息了一声，摇了摇头，
  又点燃了一支烟了。

  他慢慢地走了进去，穿过了狭窄的街道，越过了堆积如山的废料。空气中
  弥漫着食物的香气和垃圾的臭味，交织在一起，形成了一种独特的味道。
  他不禁深深地吸了一口气，感受到了这座城市独有的气息。

  他的内心此刻如翻江倒海一般——这里将是他新的起点，也是他新的战场。
  他不禁想起了家乡的一切，想起了那些曾经支持过他的人，也想起了那些
  背叛过他的人。一幕幕回忆如潮水般涌上心头，令他感慨万千。思绪如
  千军万马，心潮澎湃；往事历历在目，恍若隔世；前路漫漫无期，前途未卜。

  突然，他停下了脚步。前方的暗巷里传来了激烈的争吵声，一帮人正在
  围堵一个年轻人，一阵阵怒骂声此起彼伏，一声声哀求声不绝于耳，一幕幕
  恶行触目惊心。林家耀握紧了拳头，内心升起了强烈的正义感。他不寒而栗，
  浑身的血液在沸腾，千钧一发之际，他做出了一个重要的决定——他要出手。

  然而他又犹豫了。他知道这是一座弱肉强食的城市，他知道自己初来乍到，
  他知道这里的每一个人都可能是敌人，他知道任何一个选择都可能改变他的
  命运，他知道任何一个错误都可能让他万劫不复。内心如翻江倒海，心中
  如千军万马，脑海如万丈深渊。千钧一发之际，他深吸一口气，平复了一下
  内心，缓缓地走了过去。

  那个年轻人看见了他，眼中闪烁着一丝希望的光芒。林家耀走到那帮人面前，
  冷冷地看着他们，眼神中充满了威严。

  "你是什么人？"为首的那个人恶狠狠地问道，一脸的不屑。

  林家耀淡淡地笑了笑，缓缓地说道："我是来管闲事的。"一句话轻描淡写，
  却气势如虹，压得那帮人面面相觑。一时间，巷子里陷入了死一般的寂静。

  "哼，管闲事？你也不看看这是什么地方！"那人冷笑一声，手里的砍刀
  闪着寒光，锋芒毕露，杀气腾腾。

  林家耀的内心此刻如翻江倒海。他不寒而栗，他气愤填膺，他正义感油然而生。
  他知道，这是一场硬仗，但他也知道，他必须要打。千钧一发之际，他做了
  一个决定——他要以一敌众。

  战斗瞬间爆发。林家耀一拳打出，那人应声倒地。一脚踢出，另一人四脚朝天。
  一掌拍出，第三人口吐鲜血。一招一式，行云流水；一拳一脚，势如破竹；
  一进一退，游刃有余。那帮人惊得目瞪口呆，面如死灰，浑身不寒而栗。

  不到片刻，那帮人全部躺在地上，惨不忍睹，奄奄一息。林家耀喘了口气，
  擦了擦嘴角的血迹，淡淡地说道："滚吧。以后再见到弱者被欺负，我还是
  会出手。"一句话掷地有声，让那帮人心惊胆战，魂飞魄散。

  那个年轻人跪在地上，热泪盈眶，感激涕零地说道："大哥，谢谢你。"

  林家耀扶起他，温和地笑了笑："以后要自己变强。这座城市，弱者没有资格
  哭泣。"这句话如同一记重锤，敲在年轻人的心上。他深深地记住了这句话。

  他知道，这座城市是不公平的，弱肉强食是这里的铁律。但他也知道，只要
  他能够坚持下去，就一定能够看到希望的曙光。他的心中充满了无尽的勇气
  和力量。他抬头看向夜空，夜空中闪烁着无数的繁星，仿佛在为他喝彩。

  最后，他迈开了坚定的步伐，向前走去。此时此刻，他对未来充满了无限的
  期待和美好的憧憬。他知道，这只是他人生的开始，他将会创造属于自己的
  传奇。风云变幻，世事无常，但他心中的信念永不熄灭。

  人生如戏，戏如人生。每个人都是自己生命中的主角，每个人都在书写自己
  的故事。林家耀深深地明白了这个道理。他知道，他的故事才刚刚开始，
  未来还有无数的可能性等着他去探索。这就是生活，这就是人生，这就是
  每一个在这座城市中挣扎的人的共同宿命。
