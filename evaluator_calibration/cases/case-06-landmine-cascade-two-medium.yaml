chapter_md: |
  # 第二章 · 旺角的一日

  林家耀每天早晨六点起床。冷水洗脸，翻出那双快要穿孔的布鞋，下楼。

  他住的这栋唐楼在庙街后巷，五楼没有电梯，楼梯口常年堆着三户人家的
  垃圾袋。二楼住的是一个老广，每天六点准时开收音机，粤曲咿咿呀呀。
  林家耀把它当闹钟。

  巷口有一家粥铺，叫「顺记」，老板娘是顺德人。林家耀跟她点一碗皮蛋
  瘦肉粥，加一碟肠粉。粥底绵滑，姜丝切得细得像发丝。他坐在胶凳上慢慢喝，
  脚边有只流浪猫蹭他裤脚。他把肠粉的尾巴掐下一小条，扔给猫。猫衔了就跑，
  躲到粥铺的煤气罐后面吞。

  他喝完粥付钱，五块三毫。老板娘找他四毛七。他把硬币放进上衣内袋——
  这是他的零钱袋，不混在皮夹里。皮夹里只放大票，硬币放上衣，是他从
  老家带来的习惯。

  林家耀骑上从赵老四那里借来的单车，一辆墨绿色的凤凰牌，链条有点松，
  骑起来咯吱咯吱响。他沿弥敦道一路向南，过了亚皆老街、过了快富街、过了
  上海街、过了登打士街。

  早高峰的弥敦道，双层巴士一辆接一辆，从他左手边超车，车身侧面印着
  「屈臣氏蒸馏水」和「大家乐快餐」的广告。过了佐敦，他拐进尖沙咀码头。

  码头钟楼前，他停下单车，锁好，走到二号泊位。

  他在等一个从中环过来的人。那个人昨晚让他今早八点在这里等。

  他等了十五分钟。

  人没来。

  林家耀没生气。在这个城市，约了不来是常事。他又看了一眼钟楼——八点二十
  三分。他骑上单车，原路返回。

  回到旺角，他把单车停在赵老四事务所楼下，上楼还钥匙。赵老四不在。他
  就把钥匙放在柜台的笔筒里，压了一张字条：「单车我骑完，有事打 BP。」

  然后他拐进花园街的一家茶餐厅——「祥兴」，是他常来的。他要了一杯冻鸳鸯，
  一份猪扒包。

  他坐在靠窗的卡座里。窗外是花园街的摊贩，正在开张，塑料布一块一块
  掀起来，水果堆的香味和咸鱼的腥味混在一起。

  他想起上周，平头那三个收数仔在庙街拦阿威，索要八千港币的「买路钱」。
  阿威吓得脸白，回来跟他哭。林家耀没骂阿威，只是让阿威详细复述了一遍
  那三个人的长相、口音、穿什么鞋。

  平头是福建帮的外围。福建帮在庙街收保护费，早就是行规。问题不在这三
  个人，问题在他们背后的人——是谁决定在这个时候捏阿威？林家耀心里转
  了三个名字。他必须搞清楚是哪一个。

  阿威此刻在广华医院三楼走廊里站着。手心全是汗。不是怕——医生说了
  病情稳定——他是想起了昨天晚上的事。平头临走在阿威耳边说了一句很
  轻的话，轻到只有他一个人听见。那句话像一根针扎在他脑子里。他不知
  道该不该告诉林家耀。告诉了，林家耀会算账。不算清楚之前，阿威不敢
  开口。阿威想起妈妈躺在病房里插着鼻饲管的样子，他的胃就往下沉。他
  今天不能出事，妈妈还等着他付下礼拜的住院费。

  林家耀喝完冻鸳鸯，出了茶餐厅。阳光刺眼。他眯眼看表——下一件事下午
  两点，中环干诺道中。

  当天夜里，大雨。雨水砸在铁皮棚顶上，响声像打鼓。林家耀躺在床上盯着
  天花板的水渍——比昨天又扩了一圈。天花板迟早要穿，但那是兰姐的事。
  他的事是明天怎么回那三个收数仔的话。

  他想起自己今天在干诺道见的那个姓郑的——一个做船务代理的，瘦，黑眼圈
  很重，说话声音压得很低。郑向他打听一件事：八月底从新加坡到香港的
  一条货船，上面有一批「不在提单上的货」。林家耀听完没应声。他要回
  去查档案才能知道自己该不该接这单。

  屋顶的雨声越来越大。他翻身，看了一眼床头的闹钟——凌晨一点二十。他
  明天要六点起床。

  他闭上眼睛。

  梦里他又回到了福建老家，那年他十二岁，父亲还在世。父亲蹲在灶台前
  生火，回头对他说：「阿耀，灶火要旺，人要稳。」

  雨声在梦里变成了海浪声。
