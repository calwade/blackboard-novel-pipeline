id: case-06-landmine-cascade-two-medium
setting: gangster-hk-1983
description: |
  双medium命中使overall_pass=false。landmine_4(视角杂乱):同一场景中先写林家耀
  内心活动，再短暂跳到阿威视角描述其心理，又跳回林家耀——视角三次跳转。
  landmine_9(节奏失控):主角刚经历激烈冲突就突然跳到第二天，中间无过渡。
  两个medium组合，overall_pass应为false。其余16个landmine不得触发。
