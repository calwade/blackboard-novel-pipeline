chapter_md: |
  # 第一章 · 测试样本 · 干净过

  面档的铁锅烧得发红，猪油下锅，蒜蓉爆开的香味劈头盖脸砸过来。

  林家耀坐在灶台边的高凳上，面前一碗牛腩面，汤头滚烫。他没急着吃——先低头闻了一下。碱水面的涩味混着八角、陈皮、柱侯酱的底香，从鼻腔一路钻进空荡荡的胃。胃袋狠狠痉挛了一下。

  他夹起一箸面，吹两口气，送进嘴里。面身弹牙，牛腩炖得烂，筋头融化成胶质黏在舌尖上。他嚼了六下才咽。

  大排档只有他一个客。隔壁桌收走了三只空碗，碗底还沾着残汤。老板老何在灶台边擦铁锅，手腕一转，油布从锅沿滑到锅底，力道刚好刮掉焦痕。擦完锅，他又从围裙口袋里摸出一根烟，叼在嘴里没点——怕余火崩到锅里。

  巷口一阵穿堂风灌进来，卷起地上的旧报纸。报纸擦过林家耀鞋边，他低头看了一眼:《星岛日报》，昨天的。头版标题是港元兑美元逼近八算，旁边配一张中环交易大厅的照片:穿白衫的经纪眯着眼盯报价板，手指夹着烟，半截烟灰悬着没掉。

  他又喝了一口汤。汤底有萝卜，炖到半透明，筷子一夹就碎。他把碎萝卜捞进嘴里，舌根压出甜味。

  放下筷子的时候，碗底露出五块钱纸币——压在碗底，被热汤蒸得微潮。那是他的面钱。口袋还剩三十八块。

  他不算将来。先吃面。
