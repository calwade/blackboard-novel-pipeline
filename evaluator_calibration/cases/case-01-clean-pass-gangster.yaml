chapter_md: |
  # 第一章 · 九龙城寨的第一顿饭

  面档的铁锅烧得发红，猪油下锅，蒜蓉爆开的香味劈头盖脸砸过来。

  林家耀坐在灶台边的高凳上，面前一碗牛腩面，汤头滚烫。他没急着吃——
  先低头闻了一下。碱水面的涩味混着八角、陈皮、柱侯酱的底香，从鼻腔
  一路钻进空荡荡的胃。胃袋狠狠痉挛了一下。

  他夹起一箸面，吹两口气，送进嘴里。面身弹牙，牛腩炖得烂，筋头融化
  成胶质黏在舌尖上。他嚼了六下才咽。

  大排档只有他一个客。隔壁桌收走了三只空碗，碗底还沾着残汤。老板老何
  在灶台边擦铁锅，手腕一转，油布从锅沿滑到锅底，力道刚好刮掉焦痕。
  擦完锅，他又从围裙口袋里摸出一根烟，叼在嘴里没点——怕余火崩到锅里。

  巷口一阵穿堂风灌进来，卷起地上的旧报纸。报纸擦过林家耀鞋边，他低头
  看了一眼：《星岛日报》，昨天的。头版标题是港元兑美元逼近八算，旁边
  配一张中环交易大厅的照片：穿白衫的经纪眯着眼盯报价板，手指夹着烟，
  半截烟灰悬着没掉。

  他又喝了一口汤。汤底有萝卜，炖到半透明，筷子一夹就碎。他把碎萝卜捞
  进嘴里，舌根压出甜味。

  放下筷子的时候，碗底露出五块钱纸币——压在碗底，被热汤蒸得微潮。那
  是他的面钱。口袋还剩三十八块。

  他不算将来。先吃面。

  巷口走进来一个老妇人，推着一辆铁皮车，车上放着一个蒸笼，蒸笼里冒出
  白气。老何抬头看了一眼，打了个招呼：「林婆，今日生意几好呀？」

  「有啖食。」老妇人说着，把车停在大排档对面的墙根。她掀开蒸笼，白气
  腾起，露出一屉糯米鸡。

  林家耀把第二箸面送进嘴里。

  城寨的地是不平的，水泥地面被十几年的踩踏磨得发亮，中间低四周高，
  雨水顺着中间的凹槽流到街口的沟渠里。这个时辰没有下雨，沟渠干的。

  他把面汤喝完了小半，放下筷子，靠在椅背上。

  老何看了他一眼，又抽了一口没点的烟，嚼了嚼烟蒂：「后生仔，你边度
  嚟㗎？」

  「福建。」林家耀说。

  「福建人嚟九龙城寨做乜？」

  「搵食。」

  老何笑了一下。那个笑里没有鄙视，也没有同情，只是一种见过太多新来的
  的平静。他把擦干的铁锅挂上墙，又开始洗另一口炒锅。

  林家耀继续吃面。他知道自己接下来三件事：找一个能睡觉的地方、找一份
  可以拿到工钱的短工、摸清这条街上每个档口背后是谁罩的。

  他抬头看了一眼大排档头顶的招牌——「老何记」，三个红漆大字已经掉了
  一角，露出底下的白铁皮。招牌下面挂着一盏灯泡，电线拖到墙外，接在
  一个违规拉的总电表上。

  这个城寨就是这样的。

  他吃完最后一根面，把碗底的汤喝干。汤底沉着姜丝和几粒花椒。他把五块
  钱压在碗下，站起来。

  「老何，多谢。」他说。

  「落次嚟。」老何头也没抬。

  林家耀走出大排档，拐进巷口那条更窄的小巷。巷子两边是危楼，每一栋都
  违章加建了好几层，晾衣绳横七竖八地从二楼三楼四楼拉出来，挂着衬衫、
  裤子、孩子的尿布。一条小黑狗从他脚边窜过，追着什么东西跑进另一条
  横巷。

  空气里有味道——油炸食品、汗味、垃圾发酵、煤气味、还有一种甜腻的
  烧塑料味。每种味道都告诉他这是 1983 年的九龙城寨，不是别的地方。

  他在第三个横巷口停了下来。前面是一家当铺，铁闸半拉，柜台里有个
  戴眼镜的老头正在擦拭一只银怀表。柜台上挂着一块红漆木牌：「当七
  赎九，三个月为限。」

  林家耀摸了摸内袋。内袋里没有任何可以当的东西。他又往前走。

  走了二十步，他看见一家小旅馆，招牌写着「东头村道时钟酒店」，下面
  贴着一张手写的纸：「一晚三十蚊，包毛巾。」

  他推开门进去。
