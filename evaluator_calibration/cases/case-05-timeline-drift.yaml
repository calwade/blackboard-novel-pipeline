chapter_md: |
  中环毕打街。下午三点钟，日头正毒。

  林家耀站在置地广场对面的骑楼下，衬衫领口敞开，左手夹着一根万宝路，烟灰积了半截没弹。他在等一个人，但时间还早。

  他从裤袋里掏出手机。

  Nokia 3310 还要再等十七年才会出现，iPhone 还要再等二十四年。可是林家耀手里这块玻璃板，屏幕亮起来的时候映出他的脸——下巴还没刮的胡茬，左眉骨上那道细长旧疤。他拇指在屏幕上划了一下，打开联系人，找到"Mr. Walsh"。

  电话拨出去，响了四声，对面接了。苏格兰口音从听筒里传出来，夹杂着警署打字机的哒哒声。

  “Walsh，”林家耀说，“今晚六点，都爹利街，石阶，一个人来。”

  对方沉默了两秒。林家耀听见那边有人翻档案。

  “油麻地那单嘢，”Walsh 说，“你上次俾我嗰份料，廉政公署今日正式立案。你手上仲有几多张牌？”

  “够你升总督察。”林家耀把烟按灭在墙砖上，“但今次唔系关于你升职。系关于中环有个鬼佬大班，佢收咗嘅数目，大到廉政公署都要眨下眼。”

  电话那头传来一声低笑。“你越来越似侦探。”

  “我只系识计数。”

  林家耀挂了电话。把手机塞回裤袋。屏幕暗下去之前，跳出一条信息推送——苹果公司还没发布新产品，但财经新闻已经在炒了。他扫了一眼，没点开。

  骑楼下走进来一个穿花衬衫的少年，平头，脚踩人字拖，手里攥着一杯冻柠茶。他在林家耀旁边站定，吸了一口柠茶，冰块哗啦响。

  “耀哥，Walsh 嗰边点？”少年问。

  “佢会嚟。”林家耀说。他从口袋里摸出五块钱，递给少年。“去买杯冻柠茶自己饮。我唔饮甜嘅。”
