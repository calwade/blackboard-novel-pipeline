chapter_md: |
  # 第一章 · 中环毕打街的午后

  一九八三年九月十九日，下午三点钟，日头正毒。毕打街的柏油路被烤得发软，
  一辆红白相间的的士驶过，轮胎在路面上留下两条浅浅的印子。林家耀站在
  置地广场对面的骑楼下，衬衫领口敞开，左手夹着一根万宝路，烟灰积了半
  截没弹。他在等一个人，但时间还早。

  骑楼柱子贴着一张《华侨日报》头版，日期是今天。大字标题写着「港元跌
  至历史新低，一美元兑九点六港元」。纸下面那张补角的旧报纸还没撕掉，
  露出半截「邵氏兄弟新片《武状元苏乞儿》今日公映」的广告词。两份报纸
  的油墨味和正午的柏油味混在一起，钻进鼻孔，林家耀眯了眯眼。

  他抬头看对面那栋刚建好的置地广场——钢结构玻璃幕墙，在烈日下反光几乎
  刺眼。去年还在打桩，今年已经在租给汇丰和渣打。一级经济的速度。

  他从裤袋里掏出手机。

  Nokia 3310 还要再等十七年才会出现，iPhone 还要再等二十四年。可是
  林家耀手里这块玻璃板，屏幕亮起来的时候映出他的脸——下巴还没刮的胡茬，
  左眉骨上那道细长旧疤。他拇指在屏幕上划了一下，打开联系人，找到
  「Mr. Walsh」。

  电话拨出去，响了四声，对面接了。苏格兰口音从听筒里传出来，夹杂着警署
  打字机的哒哒声。

  「Walsh，」林家耀说，「今晚六点，都爹利街，石阶，一个人来。」

  对方沉默了两秒。林家耀听见那边有人翻档案。

  「油麻地那单嘢，」Walsh 说，「你上次俾我嗰份料，廉政公署今日正式立案。
  你手上仲有几多张牌？」

  「够你升总督察。」林家耀把烟按灭在墙砖上，「但今次唔系关于你升职。系
  关于中环有个鬼佬大班，佢收咗嘅数目，大到廉政公署都要眨下眼。」

  电话那头传来一声低笑。「你越来越似侦探。」

  「我只系识计数。」

  林家耀挂了电话。把手机塞回裤袋。屏幕暗下去之前，跳出一条信息推送——
  苹果公司还没发布新产品，但财经新闻已经在炒了。他扫了一眼，没点开。

  骑楼下走进来一个穿花衬衫的少年，平头，脚踩人字拖，手里攥着一杯冻柠茶。
  他在林家耀旁边站定，吸了一口柠茶，冰块哗啦响。

  「耀哥，Walsh 嗰边点？」少年问。这个少年叫阿威，福建人，两年前跟着
  表姨来的香港，现在跟着林家耀跑腿。

  「佢会嚟。」林家耀说。他从口袋里摸出五块钱，递给少年。「去买杯冻柠茶
  自己饮。我唔饮甜嘅。」

  阿威接过钱，人没动。他靠近林家耀，压低声音：「耀哥，尋日晚上我跟住你
  講嗰個穿西裝嘅，返咗中环希尔顿酒店。佢个司机系 14K 嘅人——面上有粒痣，
  耳朵缺咗一小块。」

  林家耀没说话。他从裤袋里又摸出一支烟，点上。烟头的火光在他眼底跳了
  两下。

  「做得好。」他说。

  阿威把柠茶的吸管咬扁了一点，才又开口：「耀哥，你諗住俾 Walsh 几多？」

  「睇佢想要几多。」林家耀吐出一口烟，烟圈在无风的正午里缓慢散开，「
  佢而家嘅位置，再上一級就系總督察。總督察系顶多坐十年就要退嘅位。
  佢需要一份足够体面嘅 legacy——一个被廉政公署亲手送进赤柱嘅鬼佬大班。」

  「你会俾？」

  「我要佢上位。」林家耀说，「佢上位，我就有一个可以打电话嘅警司。」

  阿威想了想，又问：「甘我哋自己嗰份呢？」

  林家耀把烟拿开，看了看他：「阿威，记住一件事。你跟左我，我唔会俾你
  做低级嘅嘢。我俾你做嘅每一件事，都系买保险。Walsh 嗰份，系保险。
  中环嗰個鬼佬大班嘅数，系本金。」

  阿威点点头，半懂不懂。

  「去买柠茶。」林家耀说，「唔该买两杯。」

  阿威笑了一下，转身去了。

  林家耀把烟继续抽着，眼睛盯着对面置地广场的旋转门。他知道 Walsh 今晚
  会来。他也知道 Walsh 带什么来——一份过去三个月的监听记录，里面有三
  个名字。但他更知道的是：Walsh 此刻心里盘算的，是怎么借这份材料往上爬。

  1983 年的香港，谁都在盘算。谁都在等一个可以被点的火柴。

  林家耀要做的，就是那根火柴。

  他的手机在裤袋里又震了一下。不是电话，是一个邮件通知。他没看。他知道
  是赵老四发来的——下一单的数字。但这一刻，他不想看。

  对面置地广场的旋转门里，走出来一个穿白衬衫的男人，中年，金发，提着
  一个棕色的公文包。男人停在台阶上，抬手看表。

  林家耀把烟按灭。他知道这个人是谁——那个鬼佬大班的秘书。他每天这个
  点出来接咖啡。

  林家耀没动。他还要等十分钟。

  骑楼外的柏油路被太阳烤得发软。空气里有油墨味、烟草味、冻柠茶的柠檬味。
  1983 年 9 月 19 日的下午，毕打街上所有正在发生的交易，都是未来十年
  香港金融版图的开始。林家耀知道自己站在哪里。

  他也知道，自己手里这块玻璃屏幕不该在这里。

  但他把手揣回裤袋，像什么都没发生。
