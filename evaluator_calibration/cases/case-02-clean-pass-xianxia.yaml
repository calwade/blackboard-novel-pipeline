chapter_md: |
  # 第二章 · 晨钟三响

  宗祠后山有一片野竹林，裴长宁每日晨起打坐的地方就在竹根下。

  天刚破晓，山雾还没散透。他盘膝坐在一块半埋在土里的青石上，背靠竹节，
  膝上横放静心镜。镜面不亮——昨日已经用过一次，今日再催灵力，镜面只
  是微温，像掌心捂热的石片。

  他不急。慢才是对的。五息入，五息出，灵力在经脉中流转的速度不快，
  但稳。丹田里的气旋像一枚缓缓转动的茧，每转一圈，边缘便凝结出肉眼
  不可见的细丝——那是炼气三层的壁障。不是坚壳，是一层薄冰。

  竹梢一滴露水坠下来，砸在镜面上，溅成三瓣。他睁开眼睛，没擦。

  远处宗祠钟响三声。裴守拙又没睡——子时敲钟是族老的规矩，只有还清醒
  的人才能算准时辰。三声过后，竹林恢复沉寂。

  裴长宁低头看自己手背。指节因为常年劈柴而骨节粗大，手背上的经脉隐
  隐泛着淡青色——那是灵力运行的痕迹，不是病象。他握拳，再把拳松开，
  反复三次。每一次松拳，手上热气便多一分，丹田气旋的转速便快一丝。
  不多，一丝而已。

  就这一丝，他已经攒了三个月。

  风过竹梢，叶片簌簌作响。他没动。不是入定，是听见了别的声音——竹林
  西北角有脚步踩断枯枝，停顿了一下，又继续走。不是野兽，脚步太轻，
  是练过的人。

  裴长宁将静心镜纳入怀中，站起身，把衣襟上的露水拍掉。他没有朝声音
  的方向看，而是沿着来路下山。竹林间的石板路不长，走到宗祠后门时，
  门开着一条缝，缝里透出灯油纸的暖光。

  裴守拙还没睡。他也还没到该去问的时候。有些旧事，问早了是一道墙，
  问完才有门。

  他在后门前停了一瞬，没推门。院子里有药炉的味道——当归、白芷、一味
  他闻不出的木香。药炉的火大概烧了两个时辰，火头已经收。这说明族老
  今晨又煎了一帖药。

  裴长宁转身去了厨房。厨房在宗祠的另一头，此刻只有一盏油灯。他掀开
  水缸，舀了半瓢凉水，倒进一只粗陶碗里。水面上浮着几片昨夜落进去的
  竹叶，他没捞，就着竹叶喝了两口。水是井水，甜里带凉，下到胃里，
  整个人都静了一静。

  他把碗放回原位，转身走出厨房。

  院子东头有一间柴房。裴长宁推门进去。柴房里堆着半墙劈好的松木，另
  半墙是没劈的。他取下挂在墙钉上的柴刀——那是他自己磨的，刃口不算
  锋利，但够用——从墙角抱起一根没劈的松木，放在垫脚木上。

  第一刀下去，松木裂开，木香迎面扑来。他调匀呼吸，连劈了六刀，节奏
  均匀，没有多余的动作。汗微微沁出，额头上一层薄薄的热。

  劈到第十刀的时候，院门外传来一阵脚步声。这次不是竹林里那个轻脚步，
  是拖沓的老步子。裴长宁不必回头也知道是谁——族老最小的一个弟弟，
  裴守清，每日辰时来后院喂鸡。

  「长宁，」裴守清咳了一声，「你大伯今日想见你。」

  裴长宁把柴刀放下，擦了擦手：「几时？」

  「辰时三刻，祠堂偏厅。」

  裴长宁点头。

  裴守清多看了他一眼，没再说话，拐到鸡舍那头去了。鸡叫声很快乱成
  一片，他手里的米粒撒在地上。

  裴长宁把最后一根松木劈完，柴刀挂回墙钉，关好柴房门。

  辰时三刻。他还有半个时辰。

  他朝山泉走去。洗一把脸，再换一件干净的衣服。
