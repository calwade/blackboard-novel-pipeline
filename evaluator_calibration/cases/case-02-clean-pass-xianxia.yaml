chapter_md: |
  宗祠后山有一片野竹林，裴长宁每日晨起打坐的地方就在竹根下。

  天刚破晓，山雾还没散透。他盘膝坐在一块半埋在土里的青石上，背靠竹节，膝上横放静心镜。镜面不亮——昨日已经用过一次，今日再催灵力，镜面只是微温，像掌心捂热的石片。

  他不急。慢才是对的。五息入，五息出，灵力在经脉中流转的速度不快，但稳。丹田里的气旋像一枚缓缓转动的茧，每转一圈，边缘便凝结出肉眼不可见的细丝——那是炼气三层的壁障。不是坚壳，是一层薄冰。

  竹梢一滴露水坠下来，砸在镜面上，溅成三瓣。他睁开眼睛，没擦。

  远处宗祠钟响三声。裴守拙又没睡——子时敲钟是族老的规矩，只有还清醒的人才能算准时辰。三声过后，竹林恢复沉寂。

  裴长宁低头看自己手背。指节因为常年劈柴而骨节粗大，手背上的经脉隐隐泛着淡青色——那是灵力运行的痕迹，不是病象。他握拳，再把拳松开，反复三次。每一次松拳，手上热气便多一分，丹田气旋的转速便快一丝。不多，一丝而已。

  就这一丝，他已经攒了三个月。

  风过竹梢，叶片簌簌作响。他没动。不是入定，是听见了别的声音——竹林西北角有脚步踩断枯枝，停顿了一下，又继续走。不是野兽，脚步太轻，是练过的人。

  裴长宁将静心镜纳入怀中，站起身，把衣襟上的露水拍掉。他没有朝声音的方向看，而是沿着来路下山。竹林间的石板路不长，走到宗祠后门时，门开着一条缝，缝里透出灯油纸的暖光。

  裴守拙还没睡。他也还没到该去问的时候。有些旧事，问早了是一道墙，问完才有门。
