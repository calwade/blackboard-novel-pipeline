chapter_md: |
  # 第三章 · 弥敦道的一拳

  林家耀从赵老四那里出来的时候，天色已经黑了。弥敦道的霓虹灯一排排
  亮起来，红的绿的紫的光打在湿漉漉的马路上。他在一家粥铺的橱窗里
  看见自己的影子——衬衫皱巴巴的，头发被风吹乱了，嘴角还挂着一丝
  印油。刚才签合同的时候，赵老四让他咬破拇指按了手印，现在拇指还
  在疼。

  赵老四说中环那间唐楼的份子钱下个月开始收，一个月四千八，按六四
  分账。林家耀没跟他讨价——现在还不是时候。

  他站在粥铺橱窗前看了两秒，转身往地铁站方向走。弥敦道这个点的人
  流最杂，上班族混着收工的店伙计、夜校出来的学生、刚刚摆完档的小贩。
  他穿过一个卖烧卖的小档，老板娘递来一串，他摇手没接。

  走过油麻地戏院门口，他停下来买了一份《星岛日报》。头版是中英谈判
  的新一轮，内版才是他真想看的——有一条小豆腐块，写的是半岛酒店
  附近发生了一起"非自然死亡"案件，死者身份未公布。林家耀把报纸叠好，
  塞进腋下。

  阿威在电话亭里等他。电话亭的玻璃被涂鸦花了，上面写着「14K永恒」，
  还有一个粗口。阿威看见他来，把电话筒放下，推开玻璃门出来。

  「耀哥，」阿威压低声音，「嗰边来咗消息。今晚八点半，庙街二十六号
  B。」

  林家耀看表——七点五十三。「几多人？」

  「三个。平头、瘦狗、马仔。平头身上有把蝴蝶刀。」

  「嗰兩个呢？」

  「瘦狗只系一支木棍。马仔空手。」

  林家耀点点头。他把报纸递给阿威：「你返屋企。等我到九点半你仲未收
  到我嘅电话，你打 BP 俾赵老四。」

  「耀哥——」

  「返屋企。」林家耀说，语气不重，但阿威认得这个语气。阿威收了报纸，
  没再说话，转身走了。

  林家耀在油麻地戏院对面站了两分钟，点了一支烟。他的右手伸进衬衫内袋，
  摸了摸那把折刀——一把德国产的小折刀，他从老家带过来的，刀柄缠着
  旧胶带。他没带枪。这个城市在这个年代带枪只会招来皇家警察，不会
  让你活得更久。

  七点五十八。他过了马路，拐进弥敦道一条小巷。小巷里面通着几条横街，
  其中一条通向庙街。

  他准备拐进街角的时候，对面站了两个人。

  一个高瘦，穿黑色唐装，手里转着两颗铁胆。另一个矮胖，站在路中央，
  双臂抱胸，像一堵肉墙。瘦的那个盯着林家耀，铁胆突然停住：「耀仔。
  阿叔叫我问你句话。东头村道嗰班收数仔，你系咪多过事？」

  林家耀止步。他看了一眼瘦高个手里的铁胆，又看了一眼矮胖堵住的路。
  然后他走过去。

  一拳打在高瘦个的脸上。鼻梁骨，力道很轻，但位置刚好——对方仰头退了
  两步。矮胖的刚动，林家耀侧身一脚踹在他膝盖上，他又退了一步，龇牙咧嘴。
  两个人都没再上前。瘦高个擦了擦鼻血，冷笑一声：「好。阿叔记低你。」
  转身走了。矮胖的跟在后面，一瘸一拐。

  整个过程不到十秒。

  林家耀吐了口气。他没有追——不是不敢，是不值得。他现在有更重要的事
  要做：明天要去见 Mr. Walsh，要搞清楚平头那三个收数仔背后的人是谁。
  一条街的事，不值得他浪费一整晚。更重要的是，他已经赢了。这一拳一脚
  足以让阿叔的人知道他不是软柿子。明天开始，这条街上没人再敢拦他的路。

  他看了看表——八点零二。离庙街二十六号 B 的约还有二十八分钟。够用。

  他把折刀重新塞回内袋，走出小巷，继续往庙街方向走。

  天上开始落雨点，零星的。几个小贩赶紧收货架。林家耀加快了脚步。他
  今晚还有三件事要办：庙街二十六号 B、一张数、赵老四明早的电话。

  但心里一角空落落的。他知道，事情不该这么轻松。

  一个在弥敦道站着两个手下的阿叔，不会派两个这么容易退的人出来做
  威慑。他们退得太快了——太干净了。

  林家耀的手本能地又回到内袋里，摸了摸那把折刀的刀柄。胶带的粗糙在
  指腹上磨着。

  然后他决定——庙街那个约不去了。他转身走向相反的方向。

  他要去另一个地方。他要去找阿威。
