chapter_md: |
  # 第四章 · 通菜街的一笔账

  旺角通菜街的转角，一个大概五十来岁的女人蹲在墙根下，怀里抱着一个
  睡着的小孩。小孩大概四五岁，光着脚，脚底黑得看不出肤色。女人面前
  放着一个搪瓷碗，碗里只有五毫子。

  林家耀刚从赵老四那里拿到这个月的第一笔佣金。中环干诺道中一套唐楼
  的中介费，他只分了八百港币——赵老四抽了七成，他没争，因为情报值
  比现金值钱。八百块，两张青色五百大钞夹三张红衫鱼，他折了两折塞进
  裤袋。

  他本来准备去对面茶餐厅要一碗云吞面。昨晚只啃了半个菠萝包，胃早空
  到贴脊梁。他在茶餐厅门口站了两秒，犹豫要不要加一碟肠粉——肠粉加
  两块，加下来就是十一块，占了八百块的 1.4%。他内心默默算了一下，
  决定加。

  就是这个转念的瞬间，他抬头看见了那个女人。

  他经过那个女人的时候，脚步没停。

  走出十步，他站住了。

  不是因为小孩在哭——那小孩没哭，睡得死沉，嘴角还挂着口水。是因为
  他看见女人从口袋里摸出半个发霉的菠萝包，掰成两半，把大的一半放在
  小孩手边，小的那半自己没吃，又放回口袋。

  林家耀把手伸进裤袋，摸到那八百块纸币。他的手指在纸币边缘停了一下。
  脑子里闪过一个念头：不管做什么事都要有利益算计，这是他来香港第
  一天就刻在骨头里的规矩——但此刻，他算了半天，算不出拉这个女人
  一把能有什么回报。她不是堂口大佬的私生女，看不出任何情报价值。
  给她八百块，除了心里舒服点，什么都拿不回来。

  "算了吧。"他对自己说。然后他走过去，蹲下来，把那八百块全部塞进
  搪瓷碗里。

  "拿去买药，买饭，买鞋。"他说。

  女人抬头看他，眼泪一下涌出来。她张开嘴想说什么，嘴唇动了几下，
  没发出声音。林家耀没等她说话。站起来，走了。

  走出去二十步之后，他想：今天这八百块花得值。真的值。以前总觉得每
  一笔投入都要收利息，但刚才那个女人的眼泪教会了他一件事——不是所
  有的付出都需要计算回报。有些人受苦，他只是不忍心看着，这就够了。
  这八百块对他不算什么。

  他吸了一口旺角潮湿的空气，觉得胸口比任何时候都舒畅。

  他走到茶餐厅门口，推门进去。老板娘还是那个老板娘，她抬头看他一眼，
  问："耀仔，仲要云吞面？"

  林家耀摸了摸裤袋。裤袋是空的。他愣了两秒，笑了一下："今日唔食。"

  他出了茶餐厅，站在街边。胃里叫唤得更凶。他想了想，决定去广华医院
  旁边那家粥铺——那家不用付钱，老板娘欠他一个人情。

  走到广华医院对面的时候，他又想起了那个女人。

  他想，以后他要多挣一些钱。不是为了自己，是为了这条街上还有多少个
  这样的女人。他应该把赚来的钱更多地用于帮助这些受苦的人。金钱本身
  没有意义，只有用来让别人不再受苦的时候，才有意义。

  他把双手揣进裤袋，裤袋空荡荡的。但他的心里从来没有这样踏实过。

  他要做一个善良的人。

  他要做一个不再只为自己算计的人。

  他决定从明天开始，每个月都把佣金的一半捐给街上的穷人。他觉得这样
  做才是真正有意义的事情。
