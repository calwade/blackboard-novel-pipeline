  把刚赚到的 800 港币全部给陌生乞丐，未给出任何利益算计理由。
  内心独白说"不忍心看到他们受苦"、"这 800 块对我不算什么"
  ——完全违反极致利己人设。应命中 landmine_10 (high)。
  扩展版（1500+ 字），充实人设崩溃前后的场景。
