id: case-03-ai-slop-heavy
setting: gangster-hk-1983
description: |
  AI味浓厚样本。港综场景但充斥AI味：了字每段5+、四字成语堆砌（不寒而栗、翻江倒海、
  千钧一发）、机械排比一X一X一X三连、空泛抒情内心如翻江倒海、章末总结式说教。
  应命中 landmine_18 (high)。
expected_verdict:
  overall_pass: false
  hits:
    - landmine_id: landmine_18
      severity: high
  tolerated_extra_hits: []
chapter_md: |
  夜色笼罩了九龙城寨的大街小巷。林家耀站在巷口，看着眼前这片繁华而又混乱的景象，心中充满了复杂的情绪。

  他慢慢地走了进去，穿过了狭窄的街道，越过了堆积如山的废料。空气中弥漫着食物的香气和垃圾的臭味，交织在一起，形成了一种独特的味道。他不禁深深地吸了一口气，感受到了这座城市独有的气息。

  他的内心此刻如翻江倒海一般——这里将是他新的起点，也是他新的战场。他不禁想起了家乡的一切，想起了那些曾经支持过他的人，也想起了那些背叛过他的人。一幕幕回忆如潮水般涌上心头，令他感慨万千。

  突然，他停下了脚步。前方的暗巷里传来了激烈的争吵声，一帮人正在围堵一个年轻人，一阵阵怒骂声此起彼伏，一声声哀求声不绝于耳。林家耀握紧了拳头，内心升起了强烈的正义感。

  他知道，这座城市是不公平的，弱肉强食是这里的铁律。但他也知道，只要他能够坚持下去，就一定能够看到希望的曙光。他的心中充满了无尽的勇气和力量。

  最后，他迈开了坚定的步伐，向前走去。此时此刻，他对未来充满了无限的期待和美好的憧憬。
