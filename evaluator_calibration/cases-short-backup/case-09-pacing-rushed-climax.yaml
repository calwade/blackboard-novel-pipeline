chapter_md: |
  林家耀从赵老四那里出来的时候，天色已经黑了。弥敦道的霓虹灯一排排亮起来，红的绿的紫的光打在湿漉漉的马路上。他在一家粥铺的橱窗里看见自己的影子——衬衫皱巴巴的，头发被风吹乱了，嘴角还挂着一丝印油。刚才签合同的时候，赵老四让他咬破拇指按了手印，现在拇指还在疼。

  赵老四说中环那间唐楼的份子钱下个月开始收，一个月四千八，按六四分账。林家耀没跟他讨价——现在还不是时候。

  他准备拐进街角的时候，对面站了两个人。

  一个高瘦，穿黑色唐装，手里转着两颗铁胆。另一个矮胖，站在路中央，双臂抱胸，像一堵肉墙。瘦的那个盯着林家耀，铁胆突然停住:“耀仔。阿叔叫我问你句话。东头村道嗰班收数仔，你系咪多过事？”

  林家耀止步。他看了一眼瘦高个手里的铁胆，又看了一眼矮胖堵住的路。然后他走过去。

  一拳打在高瘦个的脸上。鼻梁骨，力道很轻，但位置刚好——对方仰头退了两步。矮胖的刚动，林家耀侧身一脚踹在他膝盖上，他又退了一步，龇牙咧嘴。两个人都没再上前。瘦高个擦了擦鼻血，冷笑一声:“好。阿叔记低你。”转身走了。矮胖的跟在后面，一瘸一拐。

  整个过程不到十秒。

  林家耀吐了口气。他没有追——不是不敢，是不值得。他现在有更重要的事要做:明天要去见 Mr. Walsh，要搞清楚平头那三个收数仔背后的人是谁。一条街的事，不值得他浪费一整晚。更重要的是，他已经赢了。这一拳一脚足以让阿叔的人知道他不是软柿子。明天开始，这条街上没人再敢拦他的路。
