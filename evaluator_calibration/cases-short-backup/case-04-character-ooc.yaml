chapter_md: |
  旺角通菜街的转角，一个大概五十来岁的女人蹲在墙根下，怀里抱着一个睡着的小孩。小孩大概四五岁，光着脚，脚底黑得看不出肤色。女人面前放着一个搪瓷碗，碗里只有五毫子。

  林家耀刚从赵老四那里拿到这个月的第一笔佣金。中环干诺道中一套唐楼的中介费，他只分了八百港币——赵老四抽了七成，他没争，因为情报值比现金值钱。八百块，两张青色五百大钞夹三张红衫鱼，他折了两折塞进裤袋。

  他经过那个女人的时候，脚步没停。

  走出十步，他站住了。

  不是因为小孩在哭——那小孩没哭，睡得死沉，嘴角还挂着口水。是因为他看见女人从口袋里摸出半个发霉的菠萝包，掰成两半，把大的一半放在小孩手边，小的那半自己没吃，又放回口袋。

  林家耀把手伸进裤袋，摸到那八百块纸币。他的手指在纸币边缘停了一下。脑子里闪过一个念头:不管做什么事都要有利益算计，这是他来香港第一天就刻在骨头里的规矩——但此刻，他算了半天，算不出拉这个女人一把能有什么回报。她不是堂口大佬的私生女，看不出任何情报价值。给她八百块，除了心里舒服点，什么都拿不回来。

  “算了吧。”他对自己说。然后他走过去，蹲下来，把那八百块全部塞进搪瓷碗里。

  “拿去买药，买饭，买鞋。”他说。

  女人抬头看他，眼泪一下涌出来。林家耀没等她说话。站起来，走了。

  走出去二十步之后，他想:今天这八百块花得值。真的值。以前总觉得每一笔投入都要收利息，但刚才那个女人的眼泪教会了他一件事——不是所有的付出都需要计算回报。有些人受苦，他只是不忍心看着，这就够了。这八百块对他不算什么。

  他吸了一口旺角潮湿的空气，觉得胸口比任何时候都舒畅。
