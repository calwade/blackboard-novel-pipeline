schema_version: 1
tips_by_chapter_type:
  战斗:
  - 让主角用便利店里的日常物品（打火机+喷雾罐）制造临时武器，而非直接开枪。
  - 战斗高潮时，让主角左腕的契约烙印突然发烫或变色，干扰动作或提供意外信息。
  - 用旁观者的惊呼或对讲机里的惨叫，侧面描写变异体的恐怖，而非直接描述外形。
  - 让主角在战斗中喊出给招式的即兴命名（如“过期罐头杀”），用黑色幽默消解紧张。
  - 在敌人即将命中时，切到主角内心一句极短的脏话或吐槽，然后立刻接闪避动作。
  - 让变异体在濒死时突然说出人话（如“好饿”），制造一瞬间的惊悚和道德负担。
  布局:
  - 让主角在便利店里，用算账的方式（“三罐罐头换你一个情报”）向配角交代任务目标。
  - 通过主角偷听营卫队对讲机里的只言片语，拼凑出即将到来的威胁，而非直接告知。
  - 让主角在契约站排队时，从前方路人的闲聊中，获得关键地点或人物的碎片信息。
  - 用一次失败的交易（被压价或被骗），引出新势力的存在和行事风格。
  - 让主角在收银台下偷偷激活“门”，用从异世界带回的小物件作为布局的关键道具。
  过渡:
  - 用主角盘点便利店库存（“还剩七颗子弹，两包泡面”）来衔接两场战斗，同时暗示资源压力。
  - 让主角在赶路时，通过对讲机与营地里的配角进行一段“双人相声”式的吐槽对话。
  - 在主角包扎伤口时，插入一段关于旧世界生活的简短回忆，用今昔对比强化末世感。
  - 用一句“三天后”的时间跳跃，直接跳过重复性劳作，并用一个新异常（如烙印变色）重新拉回张力。
  - 让主角在契约站完成一次简单契约，用获得的积分兑换一件小物品，作为下一阶段的伏笔。
  回收:
  - 让主角用之前交易中随口提到的情报，识破当前敌人的谎言或弱点。
  - 在战后，让主角把从敌人尸体上搜刮的废铁，正好用于完成一个即将到期的契约。
  - 让之前被主角救过的小角色，在关键时刻送来关键物资或情报，完成恩情回馈。
  - 用一句看似无心的对白，揭示之前某个荒诞行为的真实目的（如“你以为我真为了那包烟？”）。
  - 让主角打开“门”，将本次事件的战利品带到异世界交易，换取下一阶段所需资源。
tips_by_scene_purpose:
  推进主线:
  - 让主角在契约站抽到一张时限极短的高难度契约，强制开启本单元主线任务。
  - 用营卫队队长赵铁城的一句命令（“明天之前交不出十斤铁，就滚出营地”），直接制造生存危机。
  - 让主角通过“门”带回的异世界物品，意外引发营地内的争夺，推动多方势力冲突。
  - 用一次变异体的突然袭击，打破营地的日常平静，迫使主角做出选择。
  塑造人物:
  - 让新角色在契约站排队时，因插队或争吵而登场，用一句脏话和一个小动作瞬间立住性格。
  - 让主角用“诊断式”口吻，一针见血地指出配角的心理弱点（如“你怕的不是死，是白死”）。
  - 通过主角在便利店里对同一件商品（如一块糖）向不同人开出不同价格，展现其看人下菜的精明。
  - 让配角在绝境中做出一个违背自身利益的选择（如把最后的水给别人），用行动而非语言完成性格定型。
  埋伏笔:
  - 让主角在整理货架时，发现一个不知来源的奇怪物品，随手放在角落，暂不解释。
  - 用对讲机里一段断断续续的求救信号，提及一个从未出现的地名（如“灰塔”），制造长期悬念。
  - 让主角在契约书上看到一个无法理解的契约内容（如“让一个人真心恨你”），先搁置不执行。
  - 在描写营地环境时，刻意提及某个被封锁的区域或一个从不与人交谈的独狼，为后期揭秘做铺垫。
hook_recipes:
  opening_hooks:
  - pattern: 异常倒计时型
    sample: 左腕的烙印突然跳了一下，从【71:59:32】直接变成了【00:59:59】。
    applies_to:
    - 战斗
    - 布局
  - pattern: 荒诞契约型
    sample: 契约书上的字迹缓缓浮现，只有一行：【明晚午夜前，让营卫队队长赵铁城对你破口大骂。】
    applies_to:
    - 布局
    - 过渡
  - pattern: 规则破坏型
    sample: 契约站的蓝光屏幕闪了闪，第一次，在没有签名的情况下，自动吐出了一张黑色的契约书。
    applies_to:
    - 布局
    - 回收
  - pattern: 尸体留言型
    sample: 挂在旗杆上的尸体，手指被人掰断了，在地上歪歪扭扭划出两个字：【快跑】。
    applies_to:
    - 战斗
    - 过渡
  closing_hooks:
  - pattern: 威胁升级型
    sample: 对讲机里，赵铁城的声音第一次在发抖：'不是一只……是一群，从老城北三环方向来的，数不清。'
    applies_to:
    - 战斗
    - 布局
  - pattern: 谜底浮现型
    sample: 他撬开死者的嘴，在里面找到了一把钥匙——上面贴着便利店的标签。
    applies_to:
    - 布局
    - 回收
  - pattern: 新角色预告型
    sample: 南渡桥废墟的方向，一个扛着火箭筒的人影，正一步步朝营地走来。
    applies_to:
    - 过渡
    - 回收
  - pattern: 身份误读型
    sample: '''你不是便利店老板。'' 对方盯着他收银台下方的地板，''你脚下藏着什么？'''
    applies_to:
    - 战斗
    - 布局
universal:
  writing_style:
  - 战斗场景用短句和连续动作词堆叠节奏，禁用长描写，保持“动作-反应-新动作”的高速循环。
  - 对白占比保持40%以上，用对话推进情节、交代设定、塑造人物，拒绝大段旁白式介绍。
  - 在紧张场景中，插入一句口语化内心独白（如“草，这下亏大了”），用黑色幽默瞬间消解严肃感。
  - 用精确数字描述资源（“只剩三颗子弹”、“烙印还剩四小时”），制造冷酷的生存真实感。
  - 切换POV时，优先切到旁观者视角，用他们的震惊、恐惧或议论来侧面烘托主角或事件的冲击力。
  value_anchors:
  - 爽感：主角用智力（信息差、机制理解）或绝对暴力碾压困境，并在事后用一句淡定点评收尾。
  - 生存智慧：主角的务实、功利、善于利用规则和人性的弱点，在末世中无往不利，提供“强者思维”的爽感。
  - 黑色幽默：用荒诞、屎尿屁或预期违背的方式破局，将悲剧和压力转化为读者的笑点和释放感。
  - 掌控感：主角作为“操盘手”，通过布局、交易和情报运作，将各方势力玩弄于股掌之间。
  character_handling:
  - 让新角色在冲突（战斗、争吵、绝境）中登场，用其应对冲突的方式（能力、台词、态度）快速完成性格定性。
  - 为主角团队的核心成员赋予一个极端的功能化标签（如“军师”、“狂信徒”、“拆台担当”），让他们各司其职。
  - 让主角以“导师”或“奸商”身份，自上而下地剖析配角的心理困境或需求，快速确立认知差距和关系定位。
  - 通过主角对不同人开出不同价格、给予不同态度，展现其看人下菜的精明和末世生存哲学。
