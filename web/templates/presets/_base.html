<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{% block title %}题材库 · Novelforge{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
{# Same cascade order as index.html, then page-level files last. #}
<link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/pill.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/button.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/tabs.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/placeholder.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/toast.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/form.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/card.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/onboarding-wizard.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/presets.css') }}" />
{% block page_css %}{% endblock %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}" />
</head>
<body class="subpage">

<header class="topbar">
  <a class="brand brand-link" href="/" title="返回作品首页">
    <span class="brand-mark">◐</span>
    <div class="brand-text">
      <div class="brand-title">Novelforge</div>
      <div class="brand-sub">小说锻造厂</div>
    </div>
  </a>

  <nav class="subpage-crumbs" aria-label="breadcrumb">
    {% block crumbs %}
    <a href="/">作品</a>
    <span class="crumb-sep">›</span>
    <span class="is-current">题材库</span>
    {% endblock %}
  </nav>

  <div class="actions">
    <a class="btn btn-ghost" href="/" title="返回作品流水线">
      <span class="btn-glyph">←</span>作品
    </a>
    <a class="btn btn-ghost" href="/presets" title="题材库">
      <span class="btn-glyph">❖</span>题材
    </a>
    <a class="btn btn-ghost" href="/novels" title="素材库">
      <span class="btn-glyph">📚</span>素材
    </a>
  </div>
</header>

<main class="subpage-main">
  {% block content %}{% endblock %}
</main>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

{% block scripts %}{% endblock %}
</body>
</html>
