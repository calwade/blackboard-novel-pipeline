{% extends "presets/_base.html" %}
{% block title %}题材库 · Novelforge{% endblock %}

{% block content %}
<section class="page-head">
  <div class="page-head-text">
    <h1 class="page-head-title">题材库</h1>
    <p class="page-head-lede">
      题材 = 世界观事实 + 风格规范 + 特有铁律。<br />
      新建作品时可从这里挑一份作为起点；之后作品目录里的 4 份文件就与 preset 解耦。
    </p>
  </div>
  <div class="page-head-actions">
    <a href="/presets/new" class="btn btn-primary">
      <span class="btn-glyph">+</span>新建 preset
    </a>
  </div>
</section>

<section>
  <div class="preset-grid" id="genre-grid" aria-live="polite">
    <div class="placeholder" style="grid-column:1/-1;min-height:180px;">
      <div class="placeholder-title">加载中…</div>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('static', filename='js/features/presetsList.js') }}"></script>
{% endblock %}
