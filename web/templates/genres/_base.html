<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{% block title %}题材流水线 · Novelforge{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='genres.css') }}" />
</head>
<body class="genre-page">

<header class="topbar">
  <a class="brand brand-link" href="/" title="返回作品首页">
    <span class="brand-mark">◐</span>
    <div class="brand-text">
      <div class="brand-title">Novelforge</div>
      <div class="brand-sub">题材流水线 · Genre Pipeline</div>
    </div>
  </a>

  <nav class="genre-crumbs" aria-label="breadcrumb">
    {% block crumbs %}
    <a href="/">作品</a>
    <span class="crumb-sep">›</span>
    <a href="/genres" class="is-current">题材</a>
    {% endblock %}
  </nav>

  <div class="actions">
    <a class="btn btn-ghost" href="/" title="返回作品流水线">
      <span class="btn-glyph">←</span>作品首页
    </a>
    <a class="btn btn-primary" href="/genres/new" title="新建空题材">
      <span class="btn-glyph">＋</span>新建题材
    </a>
  </div>
</header>

<main class="genre-main">
  {% block content %}{% endblock %}
</main>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

{% block scripts %}{% endblock %}
</body>
</html>
