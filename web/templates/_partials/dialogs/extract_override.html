<!-- =========================================================
     OVERRIDE GENRE dialog (⎇ button on project home, Phase 4 Task 4.7)
     Submits to /api/jobs and redirects to /jobs/<id>; no inline progress.
     ========================================================= -->
<dialog id="extract-override-dialog" class="dlg">
  <div class="dlg-header">
    <h2 class="dlg-title">从原著覆盖当前题材配置</h2>
    <button class="dlg-close" aria-label="关闭" data-close-dialog>×</button>
  </div>
  <div class="dlg-body">
    <form id="extract-override-form" class="onb-form">
      <div class="form-field">
        <span class="form-label">从 novels/ 大池子勾选素材：</span>
        <div id="override-novels-checkboxes" class="wizard-checkbox-pool">
          <span class="form-hint">加载中…</span>
        </div>
      </div>
      <label class="wizard-radio">
        <input type="checkbox" name="override_with_trial">
        <span>跑 3 章试验书 <span class="form-hint">（慢）</span></span>
      </label>
      <div class="form-error" id="extract-override-error" hidden></div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" data-close-override data-close-dialog>取消</button>
        <button type="submit" class="btn btn-primary">▶ 开始拆解</button>
      </div>
    </form>
  </div>
</dialog>
